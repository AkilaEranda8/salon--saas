# ── Local development overrides ─────────────────────────────────────────
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up --build
#
# Differences from production:
#   - No SSL (HTTP only on port 8080)
#   - Local nginx config (no cert paths)
#   - CORS + tenant slug set for localhost testing

services:
  proxy:
    ports:
      - "8080:80"
    volumes:
      - ./proxy/local.conf:/etc/nginx/conf.d/default.conf:ro
    # Override to remove the certbot volumes (not needed locally)
    depends_on:
      - frontend
      - backend
      - phpmyadmin

  backend:
    environment:
      NODE_ENV: development
      DB_PASS: ${DB_PASS:-rootpass}
      DB_NAME: ${DB_NAME:-zanesalon}
      JWT_SECRET: ${JWT_SECRET:-zanesalon_local_dev_jwt_secret_only_not_for_prod}
      CORS_ORIGIN: "http://localhost:8080"
      FRONTEND_BASE_URL: "http://localhost:8080"
      PLATFORM_URL: "http://localhost:8080"

  frontend:
    build: null
    image: node:18-alpine
    working_dir: /app
    command: sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm ci --legacy-peer-deps; fi; npm run dev -- --host 0.0.0.0 --port 3006"
    environment:
      VITE_API_URL: "http://localhost:8080"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_DEV_PROXY_TARGET: "http://backend:5000"
    expose:
      - "3006"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
