server {
    listen 80;
    server_name admin.hexalyte.com;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20M;
    proxy_read_timeout   30s;
    proxy_send_timeout   30s;

    # Security headers
    add_header X-Frame-Options            "SAMEORIGIN"                              always;
    add_header X-Content-Type-Options     "nosniff"                                 always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"         always;
    add_header X-XSS-Protection           "1; mode=block"                           always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;

    # Never cache index.html — always fetch latest after deploy
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma        "no-cache"                            always;
        add_header Expires       "0"                                   always;
    }

    # React SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Socket.io (WebSocket upgrade required)
    location /socket.io/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy AI bot calls (must come before /api/ to take priority)
    location /api/ai/ {
        proxy_pass         http://aibot:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
        proxy_set_header   Authorization     $http_authorization;
    }

    # Proxy API calls to backend
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
    }

    # Proxy uploaded files to backend
    location /uploads/ {
        proxy_pass http://backend:5000;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
