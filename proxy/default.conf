# ── Nginx reverse-proxy for hexalyte.com ───────────────────────────────────────
#
# Routing:
#   salon.hexalyte.com                 → marketing website
#   api.salon.hexalyte.com             → backend API
#   pma.hexalyte.com                   → phpMyAdmin
#   admin.hexalyte.com                 → frontend (platform admin UI)
#   {slug}.salon.hexalyte.com          → frontend (tenant-specific, wildcard regex)
#
# IMPORTANT: Specific server_name blocks MUST appear before the regex wildcard
# block. Nginx matches in order: exact → regex. The regex block is last.

# ── HTTP → HTTPS redirect + ACME challenge ───────────────────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Shared SSL params (reused via include is preferred but inlined here) ──────

# ── salon.hexalyte.com → marketing website ─────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name salon.hexalyte.com;
    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate     /etc/letsencrypt/live/salon.hexalyte.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/salon.hexalyte.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        set                $website_upstream website:80;
        proxy_pass         http://$website_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── api.salon.hexalyte.com (Backend API) — HTTPS ────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.salon.hexalyte.com;
    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate     /etc/letsencrypt/live/salon.hexalyte.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/salon.hexalyte.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    add_header X-Frame-Options            "DENY"                                always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains" always;

    location / {
        set                $backend_upstream backend:5000;
        proxy_pass         http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
    }

    # AI Bot
    location /ai/ {
        set                $aibot_upstream aibot:8000;
        proxy_pass         http://$aibot_upstream/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
    }

    # WebSocket
    location /socket.io/ {
        set                $backend_upstream backend:5000;
        proxy_pass         http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── pma.hexalyte.com (phpMyAdmin) — HTTPS ────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name pma.hexalyte.com;
    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate     /etc/letsencrypt/live/hexalyte.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hexalyte.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # ── IP allowlist — restrict to known admin IPs only ──────────────────────
    # Replace with yor actual office/VPN IP(s). Block all others.
    allow  127.0.0.1;
    # allow  YOUR.OFFICE.IP.HERE;   # uncomment and set your real IP
    deny   all;

    add_header X-Frame-Options        "DENY"    always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        set                $pma_upstream phpmyadmin:80;
        proxy_pass         http://$pma_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── admin.hexalyte.com (Platform Admin UI) ──────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name admin.hexalyte.com;
    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate     /etc/letsencrypt/live/hexalyte.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hexalyte.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    location / {
        set                $frontend_upstream frontend:80;
        proxy_pass         http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        set                $backend_upstream backend:5000;
        proxy_pass         http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    location /uploads/ {
        set                $backend_upstream backend:5000;
        proxy_pass         http://$backend_upstream/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── *.salon.hexalyte.com Tenant wildcard (MUST be last — regex match) ────────
# Catches all tenant subdomains not matched by the specific blocks above.
# The wildcard SSL cert (*.salon.hexalyte.com) handles all slugs without reload.
server {
    listen 443 ssl;
    http2 on;
    server_name ~^(?<tenant_slug>[a-z0-9][a-z0-9-]*[a-z0-9])\.salon\.hexalyte\.com$;
    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate     /etc/letsencrypt/live/salon.hexalyte.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/salon.hexalyte.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    add_header X-Frame-Options           "SAMEORIGIN"                           always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains"  always;

    # Serve the React SPA — same build for every tenant
    location / {
        set                $frontend_upstream frontend:80;
        proxy_pass         http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket for Socket.io (real-time updates)
    location /socket.io/ {
        set                $backend_upstream backend:5000;
        proxy_pass         http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    location /uploads/ {
        set                $backend_upstream backend:5000;
        proxy_pass         http://$backend_upstream/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── Default: reject unknown hosts ────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;
    return 444;
}
