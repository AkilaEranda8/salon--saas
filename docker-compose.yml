services:
  # ── Nginx Reverse Proxy (handles subdomain routing) ──────────────────────
  proxy:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - phpmyadmin
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro

  certbot:
    image: certbot/dns-cloudflare
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
      - /root/cloudflare-credentials.ini:/etc/cloudflare/credentials.ini:ro
    profiles:
      - certbot

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-zanesalon}
    # Do NOT expose MySQL port to the host in production
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_USER: root
      DB_PASS: ${DB_PASS:?DB_PASS is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: 5000
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      # Stripe billing (optional — billing features disabled if not set)
      STRIPE_SECRET_KEY:          ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET:      ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_BASIC_PRICE_ID:      ${STRIPE_BASIC_PRICE_ID:-}
      STRIPE_PRO_PRICE_ID:        ${STRIPE_PRO_PRICE_ID:-}
      STRIPE_ENTERPRISE_PRICE_ID: ${STRIPE_ENTERPRISE_PRICE_ID:-}
      # Email notifications (optional)
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      # Twilio SMS (optional)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN:  ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      FRONTEND_BASE_URL:  ${FRONTEND_BASE_URL:-https://{slug}.salon.hexalyte.com}
      PLATFORM_URL:       ${PLATFORM_URL:-https://admin.hexalyte.com}
    expose:
      - "5000"
    ports:
      - "${BACKEND_PORT:-5001}:5000"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  website:
    build: ./website
    restart: unless-stopped
    expose:
      - "80"

  aibot:
    build: ./ai_bot
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      SALON_API_URL: http://backend:5000/api
    expose:
      - "8000"

  phpmyadmin:
    image: phpmyadmin:5
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_PASS:?DB_PASS is required}
      # Require login — do not auto-login as root
      PMA_USER: ""
      PMA_PASSWORD: ""
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: 64M
    expose:
      - "80"
    # NOTE: phpMyAdmin is only reachable via pma.hexalyte.com through nginx.
    # Access is controlled by nginx IP restrictions in proxy/default.conf.
    # Never expose port 80 directly on the host in production.

  # One-off seed runner
  seed:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_USER: root
      DB_PASS: ${DB_PASS:?DB_PASS is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-https://{slug}.salon.hexalyte.com}
      PLATFORM_URL:      ${PLATFORM_URL:-https://admin.hexalyte.com}
    command: node scripts/seedAll.js
    profiles:
      - seed

volumes:
  mysql_data:
  uploads_data:
  certbot_www:
  certbot_conf:
